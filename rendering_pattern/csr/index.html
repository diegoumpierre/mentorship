<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSR - Client-Side Rendering</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; background: #fafafa; color: #333; }
    h1 { color: #e44d26; }
    .timestamp { background: #fff3cd; padding: 12px; border-radius: 6px; margin: 20px 0; }
    .explanation { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #eee; line-height: 1.7; }
    .badge { display: inline-block; background: #e44d26; color: white; padding: 4px 12px; border-radius: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <span class="badge">CSR</span>
  <h1>Welcome!</h1>
  <div id="app">Loading...</div>

  <script>
    // Everything happens here, in the browser. The server just sends this empty HTML shell
    // and JavaScript takes over to build the entire page.

    function render() {
      const now = new Date().toLocaleString();
      document.getElementById('app').innerHTML = `
        <div class="timestamp">
          <strong>Page rendered at:</strong> ${now}<br>
          <em>This timestamp was generated by your browser, not the server.</em>
        </div>

        <div class="explanation">
          <h2>How Client-Side Rendering works</h2>
          <p>
            When you opened this page, the server sent a mostly empty HTML file with a "Loading..." message.
            Then your browser downloaded the JavaScript, executed it, and built everything you see right now.
          </p>
          <p>
            That means search engines initially see almost nothing — just "Loading...". The content only
            exists after JavaScript runs. This is how classic React SPAs work.
          </p>
          <p>
            <strong>The good:</strong> Once loaded, navigation feels instant. Great for dashboards and apps
            where SEO doesn't matter much.
          </p>
          <p>
            <strong>The bad:</strong> Slower first paint, bad for SEO out of the box, and users with slow
            connections stare at a blank screen while JS downloads.
          </p>
        </div>
      `;
    }

    // Simulating a small delay so you can actually see the "Loading..." state
    setTimeout(render, 800);
  </script>
</body>
</html>
